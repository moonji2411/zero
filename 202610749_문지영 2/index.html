<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>ExamMate</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f8ff;
      color: #1e293b;
    }

    nav {
      background-color: white;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 60px;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.12);
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #2563eb;
    }

    .menu span {
      margin-left: 25px;
      color: #64748b;
      font-size: 15px;
    }

    .container {
      width: 90%;
      margin: 35px auto 40px auto;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background-color: white;
      border-radius: 22px;
      padding: 25px;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.12);
      border: 1px solid #dbeafe;
    }

    .card h2 {
      margin-top: 0;
      color: #2563eb;
      font-size: 21px;
    }

    .text-input,
    input[type="date"],
    input[type="number"] {
      padding: 10px;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      margin: 5px 0;
      width: 92%;
      box-sizing: border-box;
    }

    input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
      vertical-align: middle;
    }

    button {
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 15px;
      cursor: pointer;
      margin-top: 8px;
      margin-right: 5px;
    }

    button:hover {
      background-color: #1d4ed8;
    }

    .stop-btn {
      background-color: #64748b;
    }

    .reset-btn {
      background-color: #93c5fd;
      color: #1e3a8a;
    }

    .delete-btn {
      background-color: #ef4444;
      padding: 7px 10px;
      font-size: 12px;
    }

    .delete-btn:hover {
      background-color: #dc2626;
    }

    ul {
      padding-left: 0;
      list-style: none;
    }

    li {
      margin: 10px 0;
      line-height: 1.5;
      background-color: #f8fbff;
      border: 1px solid #dbeafe;
      border-radius: 12px;
      padding: 10px;
    }

    .exam-box, .prepare-box {
      background-color: #f8fbff;
      border: 1px solid #dbeafe;
      border-radius: 15px;
      padding: 15px;
      margin-top: 12px;
    }

    .exam-title, .prepare-title {
      font-weight: bold;
      color: #1d4ed8;
      margin-bottom: 8px;
    }

    .dday {
      color: #ef4444;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .safe {
      color: #16a34a;
      font-weight: bold;
    }

    .warning {
      color: #f59e0b;
      font-weight: bold;
    }

    .danger {
      color: #ef4444;
      font-weight: bold;
    }

    .progress-wrap {
      background-color: #dbeafe;
      border-radius: 20px;
      height: 14px;
      margin: 10px 0;
      overflow: hidden;
    }

    .progress-bar {
      height: 14px;
      background-color: #2563eb;
      border-radius: 20px;
      width: 0%;
    }

    .timer-card {
      text-align: center;
    }

    .timer {
      font-size: 58px;
      font-weight: bold;
      color: #1d4ed8;
      margin: 15px 0;
    }

    .study-time, .quote, .result, .recommend {
      background-color: #eff6ff;
      border-radius: 15px;
      padding: 15px;
      margin-top: 15px;
      line-height: 1.7;
      font-weight: bold;
      color: #1e40af;
    }

    .quote {
      text-align: center;
    }

    .result {
      display: none;
    }

    footer {
      text-align: center;
      padding: 25px;
      color: #64748b;
    }

    @media (max-width: 900px) {
      .top-grid, .grid {
        grid-template-columns: 1fr;
      }

      nav {
        padding: 0 25px;
      }

      .menu {
        display: none;
      }
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">ExamMate</div>
    <div class="menu">
      <span>시험 일정</span>
      <span>우선순위</span>
      <span>오늘 할 일</span>
      <span>타이머</span>
    </div>
  </nav>

  <div class="container">

    <div class="card">
      <h2>✨ 오늘의 공부 우선순위 추천</h2>
      <div class="recommend" id="recommendBox">
        아직 등록된 시험이나 과제가 없습니다.
      </div>
    </div>

    <br>

    <div class="top-grid">
      <div class="card">
        <h2>📅 시험 일정 & 시험 범위</h2>

        <input class="text-input" type="text" id="examName" placeholder="과목명 예: 웹프로그래밍">
        <input type="date" id="examDate">
        <input class="text-input" type="text" id="rangeText" placeholder="시험 범위 예: HTML, CSS, JavaScript">
        <input type="number" id="examProgress" placeholder="공부 진도율(%)">
        <br>
        <button onclick="addExam()">시험 추가</button>

        <div id="examList"></div>
      </div>

      <div class="card timer-card">
        <h2>⏰ 뽀모도로 타이머 & 명언</h2>

        <div class="timer" id="timer">25:00</div>

        <button onclick="startTimer()">시작</button>
        <button class="stop-btn" onclick="stopTimer()">멈춤</button>
        <button class="reset-btn" onclick="resetTimer()">초기화</button>
        <button onclick="changeQuote()">명언 바꾸기</button>

        <div class="study-time" id="studyTime">
          총 공부 시간 : 0분
        </div>

        <div class="quote" id="quoteBox">
          오늘 한 시간은 내일의 두 시간을 줄여준다.
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>✅ 오늘의 할 일</h2>

        <input class="text-input" type="text" id="todoInput" placeholder="예: C언어 5장 복습">
        <br>
        <button onclick="addTodo()">할 일 추가</button>

        <ul id="todoList"></ul>
      </div>

      <div class="card">
        <h2>📌 과제 준비</h2>

        <input class="text-input" type="text" id="prepareInput" placeholder="예: 웹프 발표자료 만들기">
        <input type="date" id="prepareDate">
        <br>
        <button onclick="addPrepare()">과제 추가</button>

        <div id="prepareList"></div>
      </div>
    </div>

    <div class="card">
      <h2>📊 시험 위험도 직접 체크</h2>

      <input type="number" id="riskDay" placeholder="시험까지 남은 날짜">
      <input type="number" id="progress" placeholder="공부 진도율(%)">
      <br>
      <button onclick="checkRisk()">위험도 확인</button>

      <div class="result" id="riskResult"></div>
    </div>

  </div>

  <footer>
    ExamMate | 대학생 시험 기간을 위한 올인원 시험 관리 웹사이트
  </footer>

  <script>
    var exams = JSON.parse(localStorage.getItem("exams")) || [];
    var todos = JSON.parse(localStorage.getItem("todos")) || [];
    var prepares = JSON.parse(localStorage.getItem("prepares")) || [];
    var totalStudySeconds = Number(localStorage.getItem("totalStudySeconds")) || 0;

    var time = 25 * 60;
    var timerId;

    function saveData() {
      localStorage.setItem("exams", JSON.stringify(exams));
      localStorage.setItem("todos", JSON.stringify(todos));
      localStorage.setItem("prepares", JSON.stringify(prepares));
      localStorage.setItem("totalStudySeconds", totalStudySeconds);
    }

    function getDday(date) {
      var today = new Date();
      var targetDay = new Date(date);

      today.setHours(0, 0, 0, 0);
      targetDay.setHours(0, 0, 0, 0);

      var diff = targetDay - today;
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    function makeDdayText(dday) {
      if (dday > 0) {
        return "D-" + dday;
      } else if (dday == 0) {
        return "D-Day";
      } else {
        return "기간 종료";
      }
    }

    function getRiskText(day, progress) {
      if (day == 0) {
        return "<span class='danger'>🔥 시험 당일 모드 : 새 내용보다 요약본과 오답을 확인하세요.</span>";
      } else if (day <= 2 && progress < 50) {
        return "<span class='danger'>🚨 매우 위험</span>";
      } else if (day <= 5 && progress < 60) {
        return "<span class='warning'>⚠ 주의</span>";
      } else if (progress >= 80) {
        return "<span class='safe'>🟢 안정</span>";
      } else {
        return "<span class='warning'>🟡 보통</span>";
      }
    }

    function addExam() {
      var name = document.getElementById("examName").value;
      var date = document.getElementById("examDate").value;
      var range = document.getElementById("rangeText").value;
      var progress = Number(document.getElementById("examProgress").value);

      if (name == "" || date == "" || range == "" || progress < 0 || progress > 100) {
        alert("과목명, 날짜, 시험 범위, 진도율을 올바르게 입력해주세요.");
        return;
      }

      exams.push({
        name: name,
        date: date,
        range: range,
        progress: progress,
        done: false
      });

      saveData();
      renderAll();

      document.getElementById("examName").value = "";
      document.getElementById("examDate").value = "";
      document.getElementById("rangeText").value = "";
      document.getElementById("examProgress").value = "";
    }

    function renderExams() {
      var list = document.getElementById("examList");
      list.innerHTML = "";

      for (var i = 0; i < exams.length; i++) {
        var dday = getDday(exams[i].date);
        var ddayText = makeDdayText(dday);
        var riskText = getRiskText(dday, exams[i].progress);

        var div = document.createElement("div");
        div.className = "exam-box";

        div.innerHTML =
          "<div class='exam-title'>" + exams[i].name + "</div>" +
          "<div class='dday'>" + ddayText + "</div>" +
          "<div>" + riskText + "</div>" +
          "<div class='progress-wrap'><div class='progress-bar' style='width:" + exams[i].progress + "%'></div></div>" +
          "<div>진도율 : " + exams[i].progress + "%</div>" +
          "<label><input type='checkbox' onchange='toggleExam(" + i + ")' " + (exams[i].done ? "checked" : "") + "> " + exams[i].range + "</label><br>" +
          "<button class='delete-btn' onclick='deleteExam(" + i + ")'>삭제</button>";

        list.appendChild(div);
      }
    }

    function toggleExam(index) {
      exams[index].done = !exams[index].done;
      saveData();
      renderAll();
    }

    function deleteExam(index) {
      exams.splice(index, 1);
      saveData();
      renderAll();
    }

    function addTodo() {
      var todo = document.getElementById("todoInput").value;

      if (todo == "") {
        alert("할 일을 입력해주세요.");
        return;
      }

      todos.push({
        text: todo,
        done: false
      });

      saveData();
      renderAll();

      document.getElementById("todoInput").value = "";
    }

    function renderTodos() {
      var list = document.getElementById("todoList");
      list.innerHTML = "";

      for (var i = 0; i < todos.length; i++) {
        var li = document.createElement("li");
        li.innerHTML =
          "<label><input type='checkbox' onchange='toggleTodo(" + i + ")' " + (todos[i].done ? "checked" : "") + "> " +
          todos[i].text + "</label><br>" +
          "<button class='delete-btn' onclick='deleteTodo(" + i + ")'>삭제</button>";
        list.appendChild(li);
      }
    }

    function toggleTodo(index) {
      todos[index].done = !todos[index].done;
      saveData();
      renderAll();
    }

    function deleteTodo(index) {
      todos.splice(index, 1);
      saveData();
      renderAll();
    }

    function addPrepare() {
      var text = document.getElementById("prepareInput").value;
      var date = document.getElementById("prepareDate").value;

      if (text == "" || date == "") {
        alert("과제 내용과 마감일을 입력해주세요.");
        return;
      }

      prepares.push({
        text: text,
        date: date,
        done: false
      });

      saveData();
      renderAll();

      document.getElementById("prepareInput").value = "";
      document.getElementById("prepareDate").value = "";
    }

    function renderPrepares() {
      var list = document.getElementById("prepareList");
      list.innerHTML = "";

      for (var i = 0; i < prepares.length; i++) {
        var dday = getDday(prepares[i].date);
        var ddayText = makeDdayText(dday);

        var div = document.createElement("div");
        div.className = "prepare-box";

        div.innerHTML =
          "<div class='prepare-title'>" + prepares[i].text + "</div>" +
          "<div class='dday'>마감 " + ddayText + "</div>" +
          "<label><input type='checkbox' onchange='togglePrepare(" + i + ")' " + (prepares[i].done ? "checked" : "") + "> 완료</label><br>" +
          "<button class='delete-btn' onclick='deletePrepare(" + i + ")'>삭제</button>";

        list.appendChild(div);
      }
    }

    function togglePrepare(index) {
      prepares[index].done = !prepares[index].done;
      saveData();
      renderAll();
    }

    function deletePrepare(index) {
      prepares.splice(index, 1);
      saveData();
      renderAll();
    }

    function renderRecommend() {
      var box = document.getElementById("recommendBox");
      var bestText = "";
      var bestScore = -999;

      for (var i = 0; i < exams.length; i++) {
        if (exams[i].done == false) {
          var day = getDday(exams[i].date);
          var score = 100 - exams[i].progress;

          if (day <= 0) {
            score += 100;
          } else {
            score += 30 / day;
          }

          if (score > bestScore) {
            bestScore = score;
            bestText = "오늘은 <b>" + exams[i].name + "</b> 시험 범위부터 공부하는 것을 추천합니다.";
          }
        }
      }

      for (var j = 0; j < prepares.length; j++) {
        if (prepares[j].done == false) {
          var pday = getDday(prepares[j].date);
          var pscore = 0;

          if (pday <= 0) {
            pscore = 200;
          } else {
            pscore = 60 / pday;
          }

          if (pscore > bestScore) {
            bestScore = pscore;
            bestText = "오늘은 <b>" + prepares[j].text + "</b> 과제를 먼저 준비하는 것을 추천합니다.";
          }
        }
      }

      if (bestText == "") {
        box.innerHTML = "등록된 시험이나 과제가 없거나 모두 완료되었습니다.";
      } else {
        box.innerHTML = bestText;
      }
    }

    function startTimer() {
      clearInterval(timerId);

      timerId = setInterval(function() {
        var minute = Math.floor(time / 60);
        var second = time % 60;

        if (second < 10) {
          second = "0" + second;
        }

        document.getElementById("timer").innerHTML = minute + ":" + second;

        if (time <= 0) {
          clearInterval(timerId);
          alert("25분 집중 완료! 5분 쉬어주세요.");
        } else {
          time--;
          totalStudySeconds++;
          updateStudyTime();
          saveData();
        }
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerId);
    }

    function resetTimer() {
      clearInterval(timerId);
      time = 25 * 60;
      document.getElementById("timer").innerHTML = "25:00";
    }

    function updateStudyTime() {
      var totalMinutes = Math.floor(totalStudySeconds / 60);
      var hours = Math.floor(totalMinutes / 60);
      var minutes = totalMinutes % 60;

      if (hours > 0) {
        document.getElementById("studyTime").innerHTML =
          "총 공부 시간 : " + hours + "시간 " + minutes + "분";
      } else {
        document.getElementById("studyTime").innerHTML =
          "총 공부 시간 : " + minutes + "분";
      }
    }

    function changeQuote() {
      var quotes = [
        "오늘 한 시간은 내일의 두 시간을 줄여준다.",
        "포기하지 말고 딱 10분만 더 해보자.",
        "지금 정리한 한 페이지가 시험장에서 나를 살린다.",
        "완벽하게 하려고 미루기보다 조금이라도 시작하자.",
        "시험 전날의 불안은 오늘의 복습으로 줄일 수 있다."
      ];

      var random = Math.floor(Math.random() * quotes.length);
      document.getElementById("quoteBox").innerHTML = quotes[random];
    }

    function checkRisk() {
      var day = Number(document.getElementById("riskDay").value);
      var progress = Number(document.getElementById("progress").value);

      if (day < 0 || progress < 0 || progress > 100) {
        alert("값을 올바르게 입력해주세요.");
        return;
      }

      document.getElementById("riskResult").style.display = "block";
      document.getElementById("riskResult").innerHTML = getRiskText(day, progress);
    }

    function renderAll() {
      renderExams();
      renderTodos();
      renderPrepares();
      renderRecommend();
      updateStudyTime();
    }

    renderAll();
  </script>

</body>
</html>
